<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Afro Swag Barbershop</title>

<style>

body{
font-family:Arial;
background:#003893;
color:white;
text-align:center;
margin:0;
}

header{
background:#002868;
padding:30px;
}

.logo{
width:120px;
height:120px;
margin:auto;
background:white;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:#002868;
font-size:20px;
}

h1{
color:#FFD700;
margin:10px 0;
}

.container{
max-width:600px;
margin:auto;
background:#001f4d;
padding:25px;
border-radius:15px;
margin-top:20px;
}

input,select,button{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
font-size:16px;
}

button{
background:#CF2027;
color:white;
font-weight:bold;
cursor:pointer;
}

.btncall{
background:#FFD700;
color:black;
}

.btnwa{
background:#25D366;
}

.slots{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.slot{
background:#FFD700;
color:black;
padding:10px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.slot.selected{
background:#CF2027;
color:white;
}

.map{
width:100%;
height:300px;
border:0;
border-radius:10px;
}

.qr{
background:white;
padding:10px;
border-radius:10px;
display:inline-block;
}

</style>

</head>

<body>

<header>

<div class="logo">AFRO SWAG</div>

<h1>AFRO SWAG</h1>

<p>31 Rue Gillibert — Marseille</p>
<p>Ouvert mardi à samedi • 10h → 22h</p>

<a href="tel:0751366875">
<button class="btncall">📞 Appeler</button>
</a>

<a href="https://wa.me/33751366875">
<button class="btnwa">💬 WhatsApp</button>
</a>

</header>

<div class="container">

<h2>Réserver</h2>

<form action="https://formsubmit.co/diegoetlionel@gmail.com" method="POST">

<input type="hidden" name="_subject" value="Nouvelle réservation Afro Swag">
<input type="hidden" name="_captcha" value="false">

<select name="service" required>

<option value="">Choisir service</option>
<option>Coupe enfant - 10€</option>
<option>Coupe adulte - 15€</option>
<option>Barbe</option>
<option>Coupe + barbe</option>
<option>Teinture</option>

</select>

<input type="date" name="date" id="date" required>

<div class="slots">

<div class="slot">10:00</div>
<div class="slot">11:00</div>
<div class="slot">12:00</div>
<div class="slot">13:00</div>
<div class="slot">14:00</div>
<div class="slot">15:00</div>
<div class="slot">16:00</div>
<div class="slot">17:00</div>
<div class="slot">18:00</div>
<div class="slot">19:00</div>
<div class="slot">20:00</div>
<div class="slot">21:00</div>
<div class="slot">22:00</div>

</div>

<input type="hidden" name="heure" id="heure">

<input type="text" name="nom" placeholder="Nom" required>
<input type="text" name="telephone" placeholder="Téléphone" required>

<button type="submit">Réserver</button>

</form>

</div>

<div class="container">

<h2>Scanner pour réserver</h2>

<div class="qr">

<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://salonafroswag.neocities.org">

</div>

</div>

<div class="container">

<h2>Nous trouver</h2>

<iframe class="map"
src="https://www.google.com/maps?q=31+Rue+Gillibert+Marseille&output=embed">
</iframe>

</div>

<script>

let slots=document.querySelectorAll(".slot")
let heureInput=document.getElementById("heure")

slots.forEach(slot=>{

slot.addEventListener("click",function(){

slots.forEach(s=>s.classList.remove("selected"))

this.classList.add("selected")

heureInput.value=this.innerText

})

})

</script>

</body>
</html>
